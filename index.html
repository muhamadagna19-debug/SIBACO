<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIBACO - iOS Edition</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --surface: #1a1a1a;
            --card-bg: #242424;
            --primary: #ffa000;
            --danger: #ff1744;
            --success: #00e676;
            --text: #ffffff;
            --text-dim: #b0bec5;
            --border: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text); padding: 15px; }

        header { display: flex; align-items: center; gap: 10px; padding: 10px 0 20px; border-bottom: 1px solid var(--border); }
        header img { height: 35px; width: auto; }
        .title-area { display: flex; flex-direction: column; }
        .title-main { color: var(--primary); font-size: 1.2rem; font-weight: 900; }
        .title-sub { font-size: 0.5rem; color: var(--text-dim); font-weight: bold; }

        .section { background: var(--surface); border-radius: 12px; padding: 15px; margin-top: 15px; border: 1px solid var(--border); }
        h2 { font-size: 0.85rem; margin-bottom: 12px; color: var(--primary); text-transform: uppercase; }

        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        label { display: block; font-size: 0.65rem; color: var(--text-dim); margin-bottom: 4px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 0.9rem; -webkit-appearance: none; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; touch-action: manipulation; }
        .btn-primary { background: var(--primary); color: #000; margin-top: 10px; }
        
        .p-card { background: var(--card-bg); border-radius: 12px; padding: 15px; border-left: 5px solid var(--success); margin-bottom: 10px; }
        .p-card.warning { border-left-color: var(--primary); }
        .p-card.danger { border-left-color: var(--danger); background: #3d141d; }

        .big-timer { font-size: 2.8rem; font-weight: bold; text-align: center; margin: 8px 0; font-variant-numeric: tabular-nums; }
        .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); }

        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .stat-box { background: var(--bg-color); padding: 6px; border-radius: 6px; text-align: center; font-size: 0.75rem; }
        .stat-box small { color: var(--text-dim); display: block; font-size: 0.55rem; text-transform: uppercase; margin-bottom: 2px; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co.com/YFMpjRNN/Gemini-Generated-Image-80zl6080zl6080zl-Photoroom.png" alt="DKI">
        <img src="https://i.ibb.co.com/V0nP5sF7/logo-night-mode-Photoroom-1.png" alt="SIBACO">
        <div class="title-area">
            <span class="title-main">SIBACO</span>
            <span class="title-sub">SISTEM BREATHING APPARATUS CONTROL</span>
        </div>
    </header>

    <div class="section">
        <h2>➕ Registrasi Masuk</h2>
        <div class="grid-form">
            <div class="form-group full"><label>Nama Personel</label><input type="text" id="name" placeholder="Nama Petugas"></div>
            <div class="form-group"><label>Regu / Sektor</label><input type="text" id="regu" placeholder="Contoh: Regu C"></div>
            
            <div class="form-group">
                <label>Volume Tabung (L)</label>
                <select id="vol">
                    <option value="6.8" selected>6.8 Liter (Standar)</option>
                    <option value="6.0">6.0 Liter</option>
                    <option value="9.0">9.0 Liter</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Beban Kerja (LPM)</label>
                <select id="lpm">
                    <option value="40" selected>Ringan (40 LPM)</option>
                    <option value="50">Sedang (50 LPM)</option>
                    <option value="60">Berat (60 LPM)</option>
                </select>
            </div>

            <div class="form-group"><label>Tekanan Awal (Bar)</label><input type="number" inputmode="numeric" pattern="[0-9]*" id="press" placeholder="Contoh: 250"></div>
            <div class="form-group"><label>Batas Aman (Bar)</label><input type="number" inputmode="numeric" pattern="[0-9]*" id="margin" value="50"></div>
        </div>
        <button class="btn btn-primary" onclick="addPerson()">MULAI PEMANTAUAN</button>
    </div>

    <div class="section">
        <h2>📟 Monitor Aktif</h2>
        <div id="monitorList"></div>
        <div id="noActive" style="text-align: center; color: var(--text-dim); padding: 10px; font-size: 0.8rem;">Tidak ada personel aktif.</div>
    </div>

    <audio id="iosKeepAlive" loop playsinline src="data:audio/mpeg;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjkxLjEwMAAAAAAAAAAAAAAA//uQZAAAAAAAABMAAAAAAAABMAAABSAAAAEwAAAAAAAABMAAAASFVWAAAAAAAEgAAAAAAADgAAAAAAA+H"></audio>

    <script>
        let persons = [];
        let audioCtx = null;

        function getFormattedTime() {
            const d = new Date();
            return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        function forceiOSWake() {
            // Memaksa audio latar berputar
            const keepAlive = document.getElementById('iosKeepAlive');
            keepAlive.play().catch(()=>{});

            // Menyiapkan jalur sirine Web Audio
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function addPerson() {
            forceiOSWake();

            const name = document.getElementById('name').value.trim();
            const regu = document.getElementById('regu').value.trim() || "-";
            const press = parseInt(document.getElementById('press').value);
            const vol = parseFloat(document.getElementById('vol').value);
            const lpm = parseInt(document.getElementById('lpm').value);
            const margin = parseInt(document.getElementById('margin').value) || 50;

            if (!name || isNaN(press)) return alert("Nama dan Tekanan Awal wajib diisi!");
            if (press <= margin) return alert("Tekanan awal harus di atas batas aman!");

            const totalSec = Math.floor(((press - margin) * vol) / lpm * 60);
            const timeIn = getFormattedTime();
            
            // PERBAIKAN WAKTU ABSOLUT: Aplikasi menyimpan "Masa Depan" dalam Milidetik, bukan sekadar durasi
            const targetTimeMs = Date.now() + (totalSec * 1000);
            
            const d = new Date(targetTimeMs);
            const timeOut = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;

            persons.push({
                id: Date.now(), name, regu, press, vol, lpm, margin, timeIn, timeOut,
                initialSeconds: totalSec, targetTimeMs: targetTimeMs, alarmTriggered: false
            });

            document.getElementById('name').value = '';
            document.getElementById('press').value = '';
            render();
        }

        function render() {
            const list = document.getElementById('monitorList');
            document.getElementById('noActive').style.display = persons.length ? 'none' : 'block';
            list.innerHTML = '';

            persons.forEach(p => {
                // Kalkulasi sisa detik selalu dibandingkan dengan jam perangkat secara real-time
                p.secondsLeft = Math.ceil((p.targetTimeMs - Date.now()) / 1000);
                
                const isDanger = p.secondsLeft <= 0;
                const isWarning = p.secondsLeft > 0 && p.secondsLeft <= 300;
                const status = isDanger ? 'danger' : (isWarning ? 'warning' : '');
                
                const calcSeconds = Math.max(0, p.secondsLeft);
                const curPress = Math.max(p.margin, Math.floor((calcSeconds / p.initialSeconds) * (p.press - p.margin)) + p.margin);
                const pct = Math.max(0, (calcSeconds / p.initialSeconds) * 100);
                
                let barColor = 'var(--success)';
                if (isWarning) barColor = 'var(--primary)';
                if (isDanger) barColor = 'var(--danger)';

                list.innerHTML += `
                    <div class="p-card ${status}">
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; font-weight:bold;">
                            <span>${p.name} (${p.regu})</span>
                            <span>${p.lpm} LPM | ${p.vol}L</span>
                        </div>
                        <div class="big-timer">${formatTimeStyle(p.secondsLeft)}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%; background: ${barColor}"></div></div>
                        <div class="stats">
                            <div class="stat-box"><small>Masuk</small>${p.timeIn}</div>
                            <div class="stat-box"><small>Keluar</small><span style="color:var(--danger)">${p.timeOut}</span></div>
                            <div class="stat-box"><small>Awal</small>${p.press} B</div>
                            <div class="stat-box"><small>Sisa</small><span style="font-weight:900; color:${barColor}">${curPress} B</span></div>
                        </div>
                        <button class="btn" style="background:#00e676; color:#000; padding:8px; margin-top:10px; font-size:0.75rem;" onclick="removePerson(${p.id})">Selesai / Keluar</button>
                    </div>
                `;
            });
        }

        function formatTimeStyle(s) {
            const abs = Math.abs(s);
            const m = Math.floor(abs / 60);
            const sec = abs % 60;
            return `${s < 0 ? '-' : ''}${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function removePerson(id) {
            if (!confirm("Personel telah keluar dengan aman?")) return;
            persons = persons.filter(p => p.id !== id);
            
            // Matikan audio latar jika tidak ada personel untuk menghemat baterai iPhone
            if (persons.length === 0) {
                document.getElementById('iosKeepAlive').pause();
            }
            render();
        }

        function playiOSBeep() {
            try {
                if (!audioCtx) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.2);
                
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
                
                if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
            } catch(e) {}
        }

        // Loop utama yang mengecek waktu setiap detik
        setInterval(() => {
            if (persons.length === 0) return;
            
            let triggerAlarm = false;
            
            persons.forEach(p => {
                const sisa = Math.ceil((p.targetTimeMs - Date.now()) / 1000);
                
                // Memicu alarm jika waktu habis dan belum pernah dibunyikan
                if (sisa <= 0 && !p.alarmTriggered) {
                    triggerAlarm = true;
                    p.alarmTriggered = true; 
                }
            });

            if (triggerAlarm) {
                playiOSBeep();
            }

            render();
        }, 1000);
    </script>
</body>
</html>
